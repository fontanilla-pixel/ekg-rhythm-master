<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EKG Rhythm Master: ICU Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --green:    #00e676;
            --green-dim: #00b248;
            --green-bg: rgba(0,230,118,0.07);
            --cyan:     #00e5ff;
            --yellow:   #ffd740;
            --red:      #ff1744;
            --red-dim:  #b71c1c;
            --bg:       #05070d;
            --surface:  #0a0f1e;
            --surface2: #111827;
            --border:   rgba(255,255,255,0.07);
            --text:     #e2e8f0;
            --muted:    #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,180,90,0.08) 0%, transparent 70%);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow-x: hidden;
        }

        /* ─── Layout ─────────────────────────────── */
        .app {
            width: 100%;
            max-width: 1180px;
            display: grid;
            grid-template-columns: 220px 1fr;
            grid-template-rows: auto auto;
            gap: 14px;
        }

        /* ─── Sidebar ─────────────────────────────── */
        .sidebar {
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
        }

        .panel-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.2em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        /* Score */
        .score-num {
            font-family: 'Share Tech Mono', monospace;
            font-size: 46px;
            color: var(--green);
            line-height: 1;
            text-shadow: 0 0 24px rgba(0,230,118,0.4);
            letter-spacing: -1px;
        }

        .streak-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            min-height: 22px;
        }

        .streak-badge {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            padding: 3px 8px;
            background: rgba(0,230,118,0.1);
            border: 1px solid rgba(0,230,118,0.3);
            border-radius: 4px;
            color: var(--green);
            transition: opacity 0.3s;
        }

        /* Difficulty */
        .diff-track {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }
        .diff-pip {
            flex: 1;
            height: 5px;
            border-radius: 3px;
            background: var(--surface2);
            transition: background 0.4s;
        }
        .diff-pip.active { background: var(--green); box-shadow: 0 0 8px rgba(0,230,118,0.5); }
        .diff-pip.active.l2 { background: var(--yellow); box-shadow: 0 0 8px rgba(255,215,64,0.5); }
        .diff-pip.active.l3 { background: #ff9100; box-shadow: 0 0 8px rgba(255,145,0,0.5); }
        .diff-pip.active.l4 { background: var(--red); box-shadow: 0 0 8px rgba(255,23,68,0.5); }

        .diff-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: var(--green);
            margin-top: 6px;
            transition: color 0.4s;
        }

        /* Health */
        .health-track {
            height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 6px;
        }
        .health-fill {
            height: 100%;
            background: var(--green);
            border-radius: 4px;
            transition: width 0.5s ease, background 0.5s;
            box-shadow: 0 0 10px rgba(0,230,118,0.4);
        }
        .health-note {
            font-size: 10px;
            color: var(--muted);
            margin-top: 6px;
            font-family: 'Share Tech Mono', monospace;
        }

        /* Log */
        .log-list {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            max-height: 180px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .log-list .log-entry { opacity: 0.7; }
        .log-list .log-entry.new { color: var(--green); opacity: 1; }
        .log-list .log-entry.err { color: var(--red); opacity: 1; }

        /* Progress bar */
        .progress-row {
            display: flex;
            justify-content: space-between;
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .queue-bar {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
        }
        .queue-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.1);
            transition: background 0.3s;
        }
        .queue-dot.done { background: var(--green-dim); }
        .queue-dot.current { background: var(--green); box-shadow: 0 0 6px var(--green); }

        /* ─── Monitor ──────────────────────────────── */
        .monitor-wrap {
            background: #010408;
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            height: 340px;
        }

        /* subtle grid */
        .monitor-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,230,118,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,230,118,0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }

        /* scanline CRT overlay */
        .monitor-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.06) 2px,
                rgba(0,0,0,0.06) 4px
            );
            pointer-events: none;
            z-index: 3;
        }

        #ekg-canvas {
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        /* Monitor HUD */
        .monitor-hud-tl {
            position: absolute;
            top: 14px; left: 18px;
            z-index: 10;
        }
        .hud-lead {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            color: var(--green);
            text-shadow: 0 0 10px var(--green);
        }
        .hud-sub {
            font-size: 9px;
            color: rgba(0,230,118,0.4);
            font-family: 'Share Tech Mono', monospace;
            margin-top: 1px;
        }

        .monitor-hud-tr {
            position: absolute;
            top: 10px; right: 16px;
            z-index: 10;
            text-align: right;
        }
        .hud-hr {
            font-family: 'Share Tech Mono', monospace;
            font-size: 58px;
            color: var(--green);
            line-height: 1;
            text-shadow: 0 0 30px rgba(0,230,118,0.5);
        }
        .hud-bpm {
            font-size: 9px;
            color: var(--green-dim);
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 0.2em;
        }
        .hud-vitals {
            display: flex;
            gap: 14px;
            margin-top: 6px;
            justify-content: flex-end;
        }
        .hud-vital {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
        }
        .hud-vital span { font-size: 9px; color: var(--muted); }

        .monitor-hud-bl {
            position: absolute;
            bottom: 12px; left: 18px;
            z-index: 10;
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            color: rgba(0,230,118,0.3);
        }

        .monitor-hud-br {
            position: absolute;
            bottom: 12px; right: 18px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pulse-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: pulse-blink 1.2s infinite;
        }
        @keyframes pulse-blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        .live-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            color: var(--green);
            letter-spacing: 0.15em;
        }

        /* ─── Interaction Zone ─────────────────────── */
        .interaction {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 22px 24px;
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }
        .q-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.02em;
            color: var(--text);
        }
        .q-meta {
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            color: var(--muted);
            text-align: right;
            line-height: 1.6;
        }
        .q-meta .diff-tag {
            color: var(--green);
            display: block;
        }

        /* Timer */
        .timer-track {
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 18px;
        }
        .timer-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.1s linear, background 0.5s;
        }

        /* Options grid */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .opt-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
        }
        .opt-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,230,118,0.08), transparent);
            transition: left 0.3s;
        }
        .opt-btn:hover:not(:disabled)::before { left: 100%; }
        .opt-btn:hover:not(:disabled) {
            border-color: rgba(0,230,118,0.4);
            background: rgba(0,230,118,0.06);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0,230,118,0.1);
        }
        .opt-btn:active:not(:disabled) { transform: translateY(0); }
        .opt-btn:disabled { opacity: 0.4; cursor: default; }

        .opt-btn .opt-key {
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            color: var(--muted);
            display: block;
            margin-bottom: 3px;
            letter-spacing: 0.15em;
        }

        /* Feedback */
        .feedback-zone {
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .feedback-zone.show { display: flex; }

        .feedback-top {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        .res-icon {
            width: 52px; height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
        }
        .res-icon.correct {
            background: rgba(0,230,118,0.1);
            border: 1px solid rgba(0,230,118,0.3);
            color: var(--green);
        }
        .res-icon.wrong {
            background: rgba(255,23,68,0.1);
            border: 1px solid rgba(255,23,68,0.3);
            color: var(--red);
        }

        .res-content { flex: 1; }
        .res-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 18px;
            line-height: 1;
            margin-bottom: 6px;
        }
        .res-title.correct { color: var(--green); }
        .res-title.wrong { color: var(--red); }
        .res-rhythm {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            color: var(--cyan);
            letter-spacing: 0.1em;
            margin-bottom: 6px;
        }
        .res-body {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.6;
        }

        /* Tags */
        .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .tag {
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            padding: 2px 7px;
            border-radius: 3px;
            letter-spacing: 0.1em;
        }
        .tag.emergency { background: rgba(255,23,68,0.15); color: var(--red); border: 1px solid rgba(255,23,68,0.3); }
        .tag.stable { background: rgba(0,230,118,0.1); color: var(--green); border: 1px solid rgba(0,230,118,0.25); }
        .tag.rate { background: rgba(0,229,255,0.1); color: var(--cyan); border: 1px solid rgba(0,229,255,0.25); }

        .feedback-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-retry {
            padding: 10px 22px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-retry:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.3); }

        .btn-next {
            padding: 10px 28px;
            background: var(--green);
            border: none;
            border-radius: 10px;
            color: #000;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 20px rgba(0,230,118,0.25);
        }
        .btn-next:hover { background: #00ff87; transform: translateY(-1px); box-shadow: 0 4px 24px rgba(0,230,118,0.4); }

        /* ─── Game Over ─────────────────────────────── */
        .gameover {
            text-align: center;
            max-width: 480px;
            width: 100%;
        }
        .gameover-icon { font-size: 64px; margin-bottom: 16px; }
        .gameover-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 64px;
            letter-spacing: -1px;
            line-height: 1;
            color: #fff;
        }
        .gameover-sub {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.25em;
            color: var(--red);
            margin: 8px 0 32px;
            text-transform: uppercase;
        }
        .gameover-score-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 28px;
        }
        .gameover-score-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.25em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .gameover-score-num {
            font-family: 'Share Tech Mono', monospace;
            font-size: 64px;
            color: var(--green);
            text-shadow: 0 0 32px rgba(0,230,118,0.5);
        }
        .btn-restart {
            width: 100%;
            padding: 18px;
            background: #fff;
            border: none;
            border-radius: 14px;
            color: #000;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-restart:hover { background: var(--green); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,230,118,0.3); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        @media (max-width: 860px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { grid-row: auto; flex-direction: row; flex-wrap: wrap; }
            .sidebar .panel { flex: 1 1 160px; }
            .options-grid { grid-template-columns: 1fr; }
            .monitor-wrap { height: 240px; }
            .hud-hr { font-size: 40px; }
        }
    </style>
</head>
<body>

<div class="app" id="app">
    <!-- ─── SIDEBAR ─── -->
    <div class="sidebar">

        <div class="panel">
            <div class="panel-label">Total XP</div>
            <div class="score-num" id="score-val">0000</div>
            <div class="streak-row">
                <div class="streak-badge" id="streak-badge" style="opacity:0">
                    STREAK ×<span id="streak-val">0</span>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-label">Difficulty</div>
            <div class="diff-track">
                <div class="diff-pip" id="d1"></div>
                <div class="diff-pip" id="d2"></div>
                <div class="diff-pip" id="d3"></div>
                <div class="diff-pip" id="d4"></div>
            </div>
            <div class="diff-label" id="diff-label">INTERN</div>
        </div>

        <div class="panel">
            <div class="panel-label">Patient Stability</div>
            <div class="health-track">
                <div class="health-fill" id="health-fill" style="width:100%"></div>
            </div>
            <div class="health-note" id="health-note">HEMODYNAMICALLY STABLE</div>
        </div>

        <div class="panel">
            <div class="panel-label">Rhythm Progress</div>
            <div class="progress-row">
                <span id="progress-text">0 / 0 seen</span>
            </div>
            <div class="queue-bar" id="queue-bar"></div>
        </div>

        <div class="panel">
            <div class="panel-label">ICU Event Log</div>
            <div class="log-list" id="log-list">
                <div class="log-entry">▸ Telemetry online</div>
                <div class="log-entry">▸ Lead II active</div>
            </div>
        </div>

    </div>

    <!-- ─── MAIN ─── -->
    <div style="display:flex;flex-direction:column;gap:14px;">

        <!-- Monitor -->
        <div class="monitor-wrap" id="monitor-wrap">
            <canvas id="ekg-canvas"></canvas>

            <div class="monitor-hud-tl">
                <div class="hud-lead">II</div>
                <div class="hud-sub">25mm/s · ×1.0</div>
            </div>

            <div class="monitor-hud-tr">
                <div class="hud-hr" id="hr-val">---</div>
                <div class="hud-bpm">BPM</div>
                <div class="hud-vitals">
                    <div class="hud-vital" style="color:#00e5ff"><span>SpO2 </span>97%</div>
                    <div class="hud-vital" style="color:#ffd740"><span>MAP </span>88</div>
                    <div class="hud-vital" style="color:#e040fb"><span>TEMP </span>37.1</div>
                </div>
            </div>

            <div class="monitor-hud-bl" id="bed-label">BED 09 · ICU TELEMETRY</div>
            <div class="monitor-hud-br">
                <div class="pulse-dot"></div>
                <div class="live-text">LIVE</div>
            </div>
        </div>

        <!-- Interaction -->
        <div class="interaction">
            <!-- Question header -->
            <div id="question-zone">
                <div class="q-header">
                    <div class="q-title">Identify the Rhythm</div>
                    <div class="q-meta">
                        <span class="diff-tag" id="q-diff-tag">LEVEL 1</span>
                        <span id="q-choices-note">4 OPTIONS</span>
                    </div>
                </div>
                <div class="timer-track">
                    <div class="timer-fill" id="timer-fill" style="width:100%;background:var(--cyan)"></div>
                </div>
                <div class="options-grid" id="options-grid"></div>
            </div>

            <!-- Feedback -->
            <div class="feedback-zone" id="feedback-zone">
                <div class="feedback-top">
                    <div class="res-icon" id="res-icon"></div>
                    <div class="res-content">
                        <div class="res-title" id="res-title"></div>
                        <div class="res-rhythm" id="res-rhythm"></div>
                        <div class="res-body" id="res-body"></div>
                        <div class="tag-row" id="tag-row"></div>
                    </div>
                </div>
                <div class="feedback-actions">
                    <button class="btn-retry" id="retry-btn" style="display:none">↩ Try Again</button>
                    <button class="btn-next" id="next-btn">Next Case →</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ─────────────────────────────────────────────
// RHYTHM LIBRARY
// ─────────────────────────────────────────────
const RHYTHMS = {
    NSR: {
        name: "Normal Sinus Rhythm",
        hr: 72,
        emergency: false,
        difficulty: 1,
        tags: ["STABLE", "60-100 BPM"],
        info: "Regular rate 60-100 bpm. Upright P-wave before each QRS. Normal PR (0.12-0.20s) and QRS (<0.12s).",
        draw(t) {
            const c = t % 100;
            if (c < 10) return -Math.sin(c * 0.31) * 6;
            if (c >= 15 && c < 18) return -(c - 15) * 4;
            if (c >= 18 && c < 22) return -12 + (c - 18) * 28;
            if (c >= 22 && c < 26) return 100 - (c - 22) * 30;
            if (c >= 26 && c < 30) return -(c - 26) * 2;
            if (c >= 50 && c < 72) return -Math.sin((c - 50) * 0.143) * 12;
            return 0;
        }
    },
    SINUS_BRADY: {
        name: "Sinus Bradycardia",
        hr: 44,
        emergency: false,
        difficulty: 1,
        tags: ["STABLE", "< 60 BPM"],
        info: "Same morphology as NSR but rate < 60 bpm. May be normal in athletes; can be pathological with symptoms.",
        draw(t) {
            const c = t % 160;
            if (c < 10) return -Math.sin(c * 0.31) * 6;

// ─────────────────────────────────────────────
// DIFFICULTY SYSTEM
// ─────────────────────────────────────────────
const DIFFICULTY_LEVELS = [
    { level: 1, label: "INTERN",   minCorrect: 0,  timeMs: 18000, choices: 4, pool: [1,2] },
    { level: 2, label: "RESIDENT", minCorrect: 4,  timeMs: 13000, choices: 4, pool: [1,2,3] },
    { level: 3, label: "FELLOW",   minCorrect: 9,  timeMs: 9000,  choices: 5, pool: [1,2,3,4] },
    { level: 4, label: "ATTENDING",minCorrect: 15, timeMs: 6000,  choices: 6, pool: [1,2,3,4] },
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let score = 0, streak = 0, health = 100, correctCount = 0;
let currentRhythm = null, currentChoices = [];
let timerInterval = null, timeRemaining = 1;
let hasFailedCurrent = false;

// No-repeat queue
const rhythmKeys = Object.keys(RHYTHMS);
let rhythmQueue = [], seenCount = 0;

// Canvas
const canvas = document.getElementById('ekg-canvas');
const ctx = canvas.getContext('2d');
let scanX = 0, waveY = 0;
const SCAN_SPEED = 2.8;
let prevY = null;
let animId = null;

// ─────────────────────────────────────────────
// QUEUE
// ─────────────────────────────────────────────
function buildQueue(diffLevel) {
    const pool = DIFFICULTY_LEVELS[diffLevel - 1].pool;
    const eligible = rhythmKeys.filter(k => pool.includes(RHYTHMS[k].difficulty));
    // Fisher-Yates shuffle
    const arr = [...eligible];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function getDiffLevel() {
    for (let i = DIFFICULTY_LEVELS.length - 1; i >= 0; i--) {
        if (correctCount >= DIFFICULTY_LEVELS[i].minCorrect) return i;
    }
    return 0;
}

function nextFromQueue() {
    const di = getDiffLevel();
    const pool = DIFFICULTY_LEVELS[di].pool;
    const eligible = rhythmKeys.filter(k => pool.includes(RHYTHMS[k].difficulty));

    // Filter queue to eligible rhythms only
    while (rhythmQueue.length === 0 || !eligible.includes(rhythmQueue[0])) {
        // Rebuild queue if empty or stale
        rhythmQueue = buildQueue(di + 1);
    }
    return rhythmQueue.shift();
}

// ─────────────────────────────────────────────
// RENDER PROGRESS DOTS
// ─────────────────────────────────────────────
function renderQueueDots() {
    const total = rhythmKeys.length;
    const bar = document.getElementById('queue-bar');
    bar.innerHTML = '';
    document.getElementById('progress-text').innerText = `${seenCount} / ${total} seen`;
    const seenKeys = new Set(rhythmKeys.slice(0, seenCount));
    rhythmKeys.forEach((k, i) => {
        const d = document.createElement('div');
        d.className = 'queue-dot' + (k === currentRhythm?.__key ? ' current' : i < seenCount ? ' done' : '');
        bar.appendChild(d);
    });
}

// ─────────────────────────────────────────────
// DIFFICULTY UI
// ─────────────────────────────────────────────
const diffColors = ['var(--green)', '#ccff00', '#ff9100', 'var(--red)'];
const diffClasses = ['', 'l2', 'l3', 'l4'];

function updateDifficultyUI() {
    const di = getDiffLevel();
    const d = DIFFICULTY_LEVELS[di];
    document.getElementById('diff-label').innerText = d.label;
    document.getElementById('diff-label').style.color = diffColors[di];
    document.getElementById('q-diff-tag').innerText = `LEVEL ${di + 1} · ${d.label}`;
    document.getElementById('q-diff-tag').style.color = diffColors[di];
    document.getElementById('q-choices-note').innerText = `${d.choices} OPTIONS`;

    for (let i = 1; i <= 4; i++) {
        const pip = document.getElementById('d' + i);
        pip.className = 'diff-pip' + (i <= di + 1 ? ` active ${diffClasses[di]}` : '');
    }
}

// ─────────────────────────────────────────────
// CANVAS
// ─────────────────────────────────────────────
function resizeCanvas() {
    const wrap = document.getElementById('monitor-wrap');
    canvas.width = wrap.clientWidth;
    canvas.height = wrap.clientHeight;
    waveY = canvas.height / 2 + 10;
    scanX = 0; prevY = null;
}

function drawLoop() {
    // Erase ahead of scan (sweeper)
    ctx.clearRect(scanX, 0, 50, canvas.height);

    // Draw line segment
    if (prevY !== null && scanX > 0) {
        const val = currentRhythm ? currentRhythm.draw(Date.now() / 9) : 0;
        const targetY = waveY + val;

        ctx.beginPath();
        ctx.moveTo(scanX - SCAN_SPEED, prevY);
        ctx.lineTo(scanX, targetY);
        ctx.strokeStyle = '#00e676';
        ctx.lineWidth = 2.2;
        ctx.lineJoin = 'round';
        ctx.shadowBlur = 14;
        ctx.shadowColor = '#00e676';
        ctx.stroke();

        prevY = targetY;
    } else {
        const val = currentRhythm ? currentRhythm.draw(Date.now() / 9) : 0;
        prevY = waveY + val;
    }

    scanX += SCAN_SPEED;
    if (scanX >= canvas.width) {
        scanX = 0;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        prevY = null;
    }

    animId = requestAnimationFrame(drawLoop);
}

// ─────────────────────────────────────────────
// LOAD PATIENT
// ─────────────────────────────────────────────
function loadPatient() {
    // Reset UI
    document.getElementById('feedback-zone').classList.remove('show');
    document.getElementById('question-zone').style.display = '';
    document.getElementById('retry-btn').style.display = 'none';
    hasFailedCurrent = false;

    // Pick rhythm
    const key = nextFromQueue();
    currentRhythm = { ...RHYTHMS[key], __key: key };
    seenCount++;

    updateDifficultyUI();

    // HR
    document.getElementById('hr-val').innerText = currentRhythm.hr || '---';

    // Bed label
    document.getElementById('bed-label').innerText =
        `BED ${String(Math.floor(Math.random() * 20 + 1)).padStart(2,'0')} · ICU TELEMETRY`;

    // Generate choices
    const di = getDiffLevel();
    const numChoices = DIFFICULTY_LEVELS[di].choices;
    currentChoices = [currentRhythm.name];

    // Add distractors — at higher levels, pick rhythms with same difficulty
    const allNames = rhythmKeys.map(k => RHYTHMS[k].name);
    let candidates = allNames.filter(n => n !== currentRhythm.name);

    // At harder levels, bias towards same-difficulty distractors
    if (di >= 2) {
        const sameDiff = rhythmKeys
            .filter(k => RHYTHMS[k].difficulty === currentRhythm.difficulty && RHYTHMS[k].name !== currentRhythm.name)
            .map(k => RHYTHMS[k].name);
        if (sameDiff.length >= 2) {
            const shuffled = sameDiff.sort(() => Math.random() - 0.5);
            currentChoices.push(...shuffled.slice(0, 2));
            candidates = candidates.filter(n => !currentChoices.includes(n));
        }
    }

    while (currentChoices.length < numChoices && candidates.length > 0) {
        const idx = Math.floor(Math.random() * candidates.length);
        currentChoices.push(candidates[idx]);
        candidates.splice(idx, 1);
    }

    currentChoices.sort(() => Math.random() - 0.5);
    renderOptions();
    startTimer();
    renderQueueDots();
    addLog(`▸ New case: Bed ${String(Math.floor(Math.random()*20+1)).padStart(2,'0')} · ${DIFFICULTY_LEVELS[di].label}`, 'new');
}

// ─────────────────────────────────────────────
// OPTIONS
// ─────────────────────────────────────────────
const hotkeys = ['A','B','C','D','E','F'];

function renderOptions() {
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    currentChoices.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerHTML = `<span class="opt-key">${hotkeys[i]}</span>${c}`;
        btn.onclick = () => handleAnswer(c);
        grid.appendChild(btn);
    });
}

// ─────────────────────────────────────────────
// TIMER
// ─────────────────────────────────────────────
function startTimer() {
    const di = getDiffLevel();
    const totalMs = DIFFICULTY_LEVELS[di].timeMs;
    timeRemaining = 1;
    const fill = document.getElementById('timer-fill');
    fill.style.transition = 'none';
    fill.style.width = '100%';
    if (timerInterval) clearInterval(timerInterval);

    const step = 50;
    const decrement = step / totalMs;

    timerInterval = setInterval(() => {
        timeRemaining -= decrement;
        const pct = Math.max(0, timeRemaining * 100);
        fill.style.transition = `width ${step}ms linear`;
        fill.style.width = pct + '%';

        // Color shift
        if (pct < 25) {
            fill.style.background = 'var(--red)';
        } else if (pct < 50) {
            fill.style.background = 'var(--yellow)';
        } else {
            fill.style.background = 'var(--cyan)';
        }

        if (timeRemaining <= 0) handleAnswer(null);
    }, step);
}

// ─────────────────────────────────────────────
// ANSWER
// ─────────────────────────────────────────────
function handleAnswer(choice) {
    clearInterval(timerInterval);
    document.getElementById('question-zone').style.display = 'none';
    const fz = document.getElementById('feedback-zone');
    fz.classList.add('show');

    const isCorrect = choice === currentRhythm.name;

    const icon = document.getElementById('res-icon');
    const title = document.getElementById('res-title');
    const rhythmLabel = document.getElementById('res-rhythm');
    const body = document.getElementById('res-body');
    const tagRow = document.getElementById('tag-row');

    rhythmLabel.innerText = `▸ ${currentRhythm.name}`;
    body.innerText = currentRhythm.info;

    // Tags
    tagRow.innerHTML = '';
    currentRhythm.tags.forEach(t => {
        const span = document.createElement('span');
        span.className = 'tag ' + (t === 'EMERGENCY' ? 'emergency' : t === 'STABLE' ? 'stable' : 'rate');
        span.innerText = t;
        tagRow.appendChild(span);
    });

    if (isCorrect) {
        if (!hasFailedCurrent) {
            streak++;
            const di = getDiffLevel();
            const speedBonus = Math.floor(timeRemaining * 80);
            const diffBonus = di + 1;
            const pts = (100 + speedBonus) * streak * diffBonus;
            score += pts;
            correctCount++;
            addLog(`▸ Correct — ${currentRhythm.name} [+${pts} XP]`, 'new');
        } else {
            addLog(`▸ Identified on retry — ${currentRhythm.name}`, 'new');
        }
        icon.className = 'res-icon correct';
        icon.innerText = '✓';
        title.className = 'res-title correct';
        title.innerText = 'Accurate Interpretation';
        document.getElementById('retry-btn').style.display = 'none';
    } else {
        if (!hasFailedCurrent) {
            streak = 0;
            health -= 25;
            hasFailedCurrent = true;
            updateHealth();
            addLog(`▸ Error — Misidentified rhythm. Patient at risk.`, 'err');
        }
        icon.className = 'res-icon wrong';
        icon.innerText = '!';
        title.className = 'res-title wrong';
        title.innerText = choice === null ? 'Critical Delay' : 'Clinical Oversight';
        body.innerText = `The correct rhythm is "${currentRhythm.name}". ${currentRhythm.info}`;
        document.getElementById('retry-btn').style.display = '';
    }

    document.getElementById('score-val').innerText = String(score).padStart(4, '0');
    document.getElementById('streak-val').innerText = streak;
    document.getElementById('streak-badge').style.opacity = streak > 1 ? '1' : '0';

    if (health <= 0) { setTimeout(triggerGameOver, 600); return; }
    updateDifficultyUI();
}

function retryRound() {
    document.getElementById('feedback-zone').classList.remove('show');
    document.getElementById('question-zone').style.display = '';
    document.getElementById('retry-btn').style.display = 'none';
    renderOptions();
    startTimer();
}

// ─────────────────────────────────────────────
// HEALTH
// ─────────────────────────────────────────────
function updateHealth() {
    const fill = document.getElementById('health-fill');
    const note = document.getElementById('health-note');
    fill.style.width = health + '%';
    if (health <= 25) {
        fill.style.background = 'var(--red)';
        fill.style.boxShadow = '0 0 10px rgba(255,23,68,0.5)';
        note.innerText = 'CRITICAL INSTABILITY';
        note.style.color = 'var(--red)';
    } else if (health <= 50) {
        fill.style.background = 'var(--yellow)';
        fill.style.boxShadow = '0 0 10px rgba(255,215,64,0.4)';
        note.innerText = 'COMPENSATING';
        note.style.color = 'var(--yellow)';
    } else {
        fill.style.background = 'var(--green)';
        fill.style.boxShadow = '0 0 10px rgba(0,230,118,0.4)';
    }
}

// ─────────────────────────────────────────────
// LOG
// ─────────────────────────────────────────────
function addLog(msg, type = '') {
    const list = document.getElementById('log-list');
    const div = document.createElement('div');
    div.className = `log-entry ${type}`;
    div.innerText = msg;
    list.prepend(div);
    // Keep log short
    while (list.children.length > 14) list.removeChild(list.lastChild);
}

// ─────────────────────────────────────────────
// GAME OVER
// ─────────────────────────────────────────────
function triggerGameOver() {
    cancelAnimationFrame(animId);
    clearInterval(timerInterval);

    document.getElementById('app').innerHTML = `
        <div style="grid-column:1/-1;display:flex;justify-content:center;">
        <div class="gameover">
            <div class="gameover-icon">🏥</div>
            <div class="gameover-title">UNIT CRASH</div>
            <div class="gameover-sub">Patient Safety Compromised</div>
            <div class="gameover-score-box">
                <div class="gameover-score-label">Final XP Accumulation</div>
                <div class="gameover-score-num">${String(score).padStart(4,'0')}</div>
                <div style="margin-top:16px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted)">
                    Rhythms Identified: ${correctCount} &nbsp;·&nbsp; Max Streak: ${streak}
                </div>
            </div>
            <button class="btn-restart" onclick="location.reload()">START NEW SHIFT</button>
        </div>
        </div>
    `;
}

// ─────────────────────────────────────────────
// KEYBOARD HOTKEYS
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
    const k = e.key.toUpperCase();
    const idx = hotkeys.indexOf(k);
    if (idx !== -1 && currentChoices[idx] && document.getElementById('question-zone').style.display !== 'none') {
        handleAnswer(currentChoices[idx]);
    }
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
document.getElementById('next-btn').onclick = loadPatient;
document.getElementById('retry-btn').onclick = retryRound;
window.addEventListener('resize', resizeCanvas);

window.onload = () => {
    resizeCanvas();
    // Pre-build initial queue
    rhythmQueue = buildQueue(1);
    loadPatient();
    drawLoop();
};
</script>
</body>
</html>
